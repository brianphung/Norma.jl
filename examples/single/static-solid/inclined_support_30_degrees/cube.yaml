type: single
input mesh file: cube-1.g
output mesh file: cube.e
Exodus output interval: 1
CSV output interval: 0
model:
  type: solid mechanics
  material:
    blocks:
      fine: elastic
    elastic:
      model: linear elastic
      elastic modulus: 1.0e+09
      Poisson's ratio: 0.0
      density: 1000.0
time integrator:
  type: quasi static
  initial time: 0
  final time: 2
  time step: 1
boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "0.866025403784439 * 0.1*t"
    - node set: nsx-
      component: y
      function: "0.5 * 0.1*t"
  Inclined Dirichlet:
    - node set: nsx+
      normalx: 0.866025403784439
      normaly: 0.5
      normalz: 0
      function: "-0.1*t"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 1
  maximum iterations: 16
  relative tolerance: 1.0e-12
  absolute tolerance: 1.0e-08