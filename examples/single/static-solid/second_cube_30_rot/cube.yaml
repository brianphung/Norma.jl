type: single
input mesh file: cube-2.g
output mesh file: cube2.e
Exodus output interval: 1
CSV output interval: 0
model:
  type: solid mechanics
  material:
    blocks:
      coarse: elastic
    elastic:
      model: linear elastic
      elastic modulus: 1.0e+09
      Poisson's ratio: 0.0
      density: 1000.0
time integrator:
  type: quasi static
  initial time: -4
  final time: 4
  time step: 1
boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "back30X2"
    - node set: nsx-
      component: y
      function: "back30Y2"
    - node set: nsz-
      component: z
      function: "0.0"
    - node set: nsz+
      component: z
      function: "0.0"
    - node set: nsx+
      component: x
      function: "front30X2"
    - node set: nsx+
      component: y
      function: "front30Y2"
solver:
  type: Hessian minimizer
  step: full Newton
  minimum iterations: 1
  maximum iterations: 16
  relative tolerance: 1.0e-12
  absolute tolerance: 1.0e-08